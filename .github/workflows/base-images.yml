name: Build Base Images

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: laravel-fpm
            context: docker/laravel-fpm
          - name: laravel-frankenphp
            context: docker/laravel-frankenphp
          - name: laravel-swoole
            context: docker/laravel-swoole
          - name: laravel-roadrunner
            context: docker/laravel-roadrunner
          - name: nextjs
            context: docker/nextjs
          - name: strapi
            context: docker/strapi

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: true
          tags: |
            ghcr.io/fwartner/pnp/${{ matrix.image.name }}:latest
            ghcr.io/fwartner/pnp/${{ matrix.image.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
